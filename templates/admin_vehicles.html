<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>救護車後台</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Hiragino Sans", sans-serif;
      background: #fafaf8;
      color: #202522;
      --bg: #fafaf8;
      --surface: #ffffff;
      --ink: #202522;
      --muted: #6f7772;
      --line: #e8e4dc;
      --line-strong: #d8d2c7;
      --accent: #b86b5b;
      --accent-soft: #f6e9e5;
      --failed: #b75c55;
      --failed-bg: #fae9e7;
      --complete: #5f8a70;
      --complete-bg: #edf6ef;
      --shadow: 0 16px 36px rgba(39, 49, 43, .07);
      --text-sm: 13px;
      --text-md: 14px;
      --text-lg: 17px;
      --text-xl: 26px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-size: var(--text-md); line-height: 1.45; }
    main { max-width: 780px; margin: 0 auto; padding: 24px 16px 44px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
    h1, h2, p { margin: 0; }
    h1 { font-size: var(--text-xl); line-height: 1.25; font-weight: 800; }
    h2 { margin-bottom: 12px; font-size: var(--text-lg); line-height: 1.35; font-weight: 760; }
    form, .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    label { display: block; margin: 0 0 13px; font-weight: 720; }
    input {
      width: 100%;
      min-width: 0;
      margin-top: 6px;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    button, .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 760;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(184, 107, 91, .18);
    }
    .secondary { background: transparent; color: var(--ink); border-color: var(--line-strong); box-shadow: none; }
    .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 10px; }
    .notice, .errors {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 10px;
      font-weight: 720;
    }
    .notice { border: 1px solid #b7d4bf; background: var(--complete-bg); color: var(--complete); }
    .errors { border: 1px solid #e3b7b2; background: var(--failed-bg); color: var(--failed); }
    .vehicle-list { display: grid; gap: 8px; }
    .vehicle-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 130px) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .vehicle-label { font-weight: 780; overflow-wrap: anywhere; }
    .vehicle-plate { color: var(--muted); font-weight: 700; }
    .vehicle-kind { min-width: 48px; text-align: center; color: var(--muted); font-size: var(--text-sm); }
    @media (max-width: 560px) {
      header { align-items: stretch; flex-direction: column; }
      .grid, .vehicle-row { grid-template-columns: 1fr; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>救護車後台</h1>
      <a class="button secondary" href="/app">返回 APP</a>
    </header>

    <form method="post" action="/admin/vehicles">
      <h2>新增救護車</h2>
      {% if message %}
        <div class="notice">{{ message }}</div>
      {% endif %}
      {% if errors %}
        <div class="errors">
          {% for error in errors %}
            <div>{{ error }}</div>
          {% endfor %}
        </div>
      {% endif %}
      <div class="grid">
        <label>救護車名稱
          <input name="label" placeholder="新坡95" autocomplete="off">
        </label>
        <label>車牌 / 里程系統名稱
          <input name="ppe_name" placeholder="BPE-5951" autocomplete="off">
        </label>
      </div>
      <button type="submit">新增或更新</button>
    </form>

    <section class="panel" style="margin-top: 16px;">
      <h2>目前車輛</h2>
      <div class="vehicle-list">
        {% for vehicle in vehicles %}
          <div class="vehicle-row">
            <div class="vehicle-label">{{ vehicle.label }}</div>
            <div class="vehicle-plate">{{ vehicle.ppe_name or "使用名稱查詢" }}</div>
            <div class="vehicle-kind">{{ "自訂" if vehicle.is_custom else "內建" }}</div>
          </div>
        {% endfor %}
      </div>
    </section>
  </main>
</body>
</html>
