<!doctype html>
<html lang="zh-Hant" data-ui="task-console">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>SinpoSmart - 救災救護Worker</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Hiragino Sans", sans-serif;
      color: #202522;
      background: #fafaf8;
      --bg: #fafaf8;
      --bg-top: #fff8f2;
      --bg-line: rgba(184, 107, 91, .045);
      --surface: #ffffff;
      --ink: #202522;
      --muted: #6f7772;
      --line: #e8e4dc;
      --line-strong: #d8d2c7;
      --accent: #b86b5b;
      --accent-soft: #f6e9e5;
      --shadow: 0 16px 36px rgba(39, 49, 43, .07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(180deg, var(--bg-top) 0, var(--bg) 310px),
        repeating-linear-gradient(135deg, var(--bg-line) 0 1px, transparent 1px 18px);
      background-attachment: fixed;
      color: var(--ink);
      font-size: 17px;
      line-height: 1.45;
    }
    main { max-width: 1080px; margin: 0 auto; padding: 28px 24px 52px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 0 18px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
    .header-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    h1 { margin: 0; font-size: 31px; line-height: 1.25; font-weight: 800; }
    p { color: var(--muted); margin: 0 0 24px; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 50px; border: 1px solid transparent; border-radius: 999px; padding: 0 16px; font-weight: 760; text-decoration: none; }
    .secondary { background: transparent; color: var(--ink); border-color: var(--line-strong); }
    .entries { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .entry-card { min-height: 190px; display: flex; flex-direction: column; justify-content: space-between; gap: 24px; padding: 24px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface); color: inherit; text-decoration: none; box-shadow: var(--shadow); }
    .entry-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .entry-card strong { font-size: 27px; }
    .entry-card span { color: var(--muted); }
    @media (max-width: 620px) {
      main { padding: 22px 16px 40px; }
      header { align-items: center; }
      h1 { font-size: 25px; }
      .header-actions .button { min-height: 38px; padding: 0 12px; font-size: 15px; }
      .entries { grid-template-columns: 1fr; }
      .entry-card { min-height: 156px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>救災救護登打</h1>
      {% if show_nas_home_button() %}<div class="header-actions"><a class="button secondary" href="/">返回首頁</a></div>{% endif %}
    </header>
    <p>請選擇本次勤務類型。</p>
    <nav class="entries" aria-label="登打類型">
      <a class="entry-card" href="/app/disaster"><strong>救災登打</strong><span>工作紀錄、車輛里程、加油紀錄</span></a>
      <a class="entry-card" href="/app"><strong>救護登打</strong><span>工作紀錄、車輛里程、加油紀錄、消毒記錄、救護耗材</span></a>
    </nav>
  </main>
</body>
</html>
