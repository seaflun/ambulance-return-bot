<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SinpoSmart - 救災救護Worker</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; color: #202522; background: #fafaf8; }
    * { box-sizing: border-box; }
    main { max-width: 880px; margin: 0 auto; padding: 32px 18px; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { color: #6f7772; margin: 0 0 24px; }
    .entries { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    a { min-height: 180px; display: flex; flex-direction: column; justify-content: space-between; padding: 24px; border: 1px solid #d8d2c7; border-radius: 14px; background: #fff; color: inherit; text-decoration: none; box-shadow: 0 14px 30px rgba(39,49,43,.075); }
    a:hover { border-color: #b86b5b; transform: translateY(-1px); }
    strong { font-size: 27px; }
    span { color: #6f7772; }
    @media (max-width: 620px) { .entries { grid-template-columns: 1fr; } a { min-height: 132px; } }
  </style>
</head>
<body>
  <main>
    <h1>救災救護登打</h1>
    <p>請選擇本次勤務類型。</p>
    <nav class="entries" aria-label="登打類型">
      <a href="/app/disaster"><strong>救災登打</strong><span>工作紀錄、車輛里程與加油紀錄</span></a>
      <a href="/app"><strong>救護登打</strong><span>沿用現有救護登打介面</span></a>
    </nav>
  </main>
</body>
</html>
