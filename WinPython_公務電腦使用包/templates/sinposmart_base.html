<!doctype html>
<html lang="zh-Hant" data-ui="task-console">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <title>{% block page_title %}SinpoSmart{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='sinposmart-ui.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <main class="app-shell">
    <header class="app-header">
      <div class="app-header__copy">
        <p class="app-header__eyebrow">{% block eyebrow %}SinpoSmart{% endblock %}</p>
        <h1>{% block page_heading %}SinpoSmart{% endblock %}</h1>
      </div>
      {% block header_actions %}{% endblock %}
    </header>
    <section class="app-content">
      {% block content %}{% endblock %}
    </section>
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
