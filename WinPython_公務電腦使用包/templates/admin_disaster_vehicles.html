<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SinpoSmart - 救災車設定</title>
  <style>
    :root { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif; color:#202522; background:#fafaf8; --accent:#b86b5b; --line:#ded9d0; }
    * { box-sizing:border-box; } body { margin:0; } main { max-width:960px; margin:auto; padding:24px 16px 48px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
    h1 { margin:0; } a { color:var(--accent); } .panel { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; } label { display:grid; gap:6px; font-weight:700; }
    input,button { min-height:44px; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font:inherit; } button { cursor:pointer; font-weight:800; background:#fff; }
    .primary { color:#fff; background:var(--accent); border-color:var(--accent); } table { width:100%; border-collapse:collapse; } th,td { padding:10px; border-bottom:1px solid var(--line); text-align:left; }
    .message { color:#286438; font-weight:700; } .errors { color:#a33; font-weight:700; }
    @media(max-width:700px){ .grid{grid-template-columns:1fr} table,thead,tbody,tr,th,td{display:block} thead{display:none} td{border:0;padding:5px 0} tr{border-bottom:1px solid var(--line);padding:10px 0} }
  </style>
</head>
<body><main>
  <header><h1>救災車設定</h1><a href="/app/disaster">返回救災登打</a></header>
  {% if message %}<div class="panel message">{{ message }}</div>{% endif %}
  {% if errors %}<div class="panel errors">{% for error in errors %}<div>{{ error }}</div>{% endfor %}</div>{% endif %}
  <section class="panel">
    <h2>新增或更新車輛</h2>
    <form method="post" action="/admin/disaster-vehicles" class="grid">
      <label>車輛名稱<input name="label" placeholder="例如：新坡15" required></label>
      <label>車輛里程系統名稱<input name="ppe_name" placeholder="可留白"></label>
      <label>行車紀錄器車號<input name="recorder_code" placeholder="例如：15" required></label>
      <button class="primary" type="submit">儲存設定</button>
    </form>
  </section>
  <section class="panel"><h2>目前車輛</h2><table><thead><tr><th>車輛</th><th>里程系統名稱</th><th>行車紀錄器車號</th><th>操作</th></tr></thead><tbody>
    {% for vehicle in vehicles %}<tr><td>{{ vehicle.label }}</td><td>{{ vehicle.ppe_name or '—' }}</td><td>{{ vehicle.recorder_code }}</td><td><form method="post" action="/admin/disaster-vehicles/delete"><input type="hidden" name="label" value="{{ vehicle.label }}"><button type="submit">刪除</button></form></td></tr>{% endfor %}
  </tbody></table></section>
</main></body></html>
