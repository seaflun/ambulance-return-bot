services:
  app:
    image: python:3.12-slim
    working_dir: /app
    environment:
      TZ: Asia/Taipei
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
      ARTIFACTS_DIR: "artifacts"
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TASK_EXECUTION_MODE: "worker_queue"
      CASE_LOOKUP_SCHEDULER_ENABLED: "false"
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
    command: sh -c "pip install --root-user-action=ignore --no-cache-dir -r requirements.txt && echo '[app] dependencies ready, starting web server' && python -u app.py"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/status', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
